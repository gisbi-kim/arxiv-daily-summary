<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>arXiv Daily Briefing — Archive</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f6f7f9;color:#1f2328;line-height:1.72;font-size:15px;padding:32px 16px;word-wrap:break-word;word-break:keep-all}
.container{max-width:920px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);padding:40px 48px}
h1{font-size:28px;margin:0 0 6px;font-weight:700;color:#0d1117;letter-spacing:-.01em}
.subtitle{margin:0 0 22px;color:#656d76;font-size:14px}
.meta{font-size:13px;color:#3b434d;padding:12px 16px;background:#f6f8fa;border-left:3px solid #0969da;border-radius:6px;margin:0 0 22px}
.archive-list{list-style:none;padding:0;margin:0}
.archive-item{border-top:1px solid #eaeef2}
.archive-item:first-child{border-top:none}
.archive-link{display:block;padding:18px 4px;text-decoration:none;color:inherit;transition:background-color .12s ease}
.archive-link:hover{background:#f6f8fa;text-decoration:none}
.archive-link:hover .archive-date{color:#0969da}
.archive-date{display:inline-block;font-size:16px;font-weight:700;color:#0d1117;letter-spacing:-.005em;margin-bottom:4px;font-variant-numeric:tabular-nums}
.archive-dow{font-size:13px;font-weight:400;color:#656d76;margin-left:2px}
.archive-summary{display:block;color:#3b434d;font-size:14px;line-height:1.6}
.archive-summary.placeholder{color:#9aa4af;font-style:italic}
.archive-summary .dot{color:#c0c7d0;margin:0 6px}
.archive-summary em.empty{color:#9aa4af;font-style:italic}
footer{margin-top:36px;padding-top:16px;border-top:1px solid #eaeef2;font-size:12px;color:#656d76;text-align:center}
footer a{color:#656d76}
@media (max-width:640px){
  .container{padding:24px 20px}
  h1{font-size:23px}
  body{padding:16px 8px}
  .archive-link{padding:16px 2px}
  .archive-date{font-size:15px}
  .archive-summary{font-size:13.5px}
}
</style>
</head>
<body>
<div class="container">

<h1>📄 arXiv Daily Briefing</h1>
<p class="subtitle">cs.CV · cs.RO 매일 요약 아카이브</p>

<div id="status" class="meta">목록을 불러오는 중…</div>

<ul id="archive" class="archive-list"></ul>

<footer>
<a href="https://github.com/gisbi-kim/arxiv-daily-summary">GitHub</a>
</footer>

</div>

<script>
(async () => {
  const OWNER = 'gisbi-kim';
  const REPO = 'arxiv-daily-summary';
  const DATE_RE = /^(\d{4}-\d{2}-\d{2})\.html$/;
  const DOW = ['일','월','화','수','목','금','토'];
  const LIST_TTL_MS = 10 * 60 * 1000;
  const INSIGHT_TTL_MS = 24 * 60 * 60 * 1000;

  const status = document.getElementById('status');
  const archive = document.getElementById('archive');

  const lsGet = (k) => {
    try {
      const raw = localStorage.getItem(k);
      if (!raw) return null;
      const { t, v } = JSON.parse(raw);
      return { t, v };
    } catch { return null; }
  };
  const lsSet = (k, v) => {
    try { localStorage.setItem(k, JSON.stringify({ t: Date.now(), v })); } catch {}
  };

  const dowOf = (ymd) => DOW[new Date(ymd + 'T00:00:00').getDay()];

  async function listDates() {
    const cacheKey = `arxiv-archive:list`;
    const cached = lsGet(cacheKey);
    if (cached && Date.now() - cached.t < LIST_TTL_MS) return cached.v;

    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`);
    if (!res.ok) {
      if (cached) return cached.v;
      throw new Error(`GitHub API ${res.status}`);
    }
    const files = await res.json();
    const dates = files
      .filter(f => f.type === 'file' && DATE_RE.test(f.name))
      .map(f => f.name.match(DATE_RE)[1])
      .sort()
      .reverse();
    lsSet(cacheKey, dates);
    return dates;
  }

  async function loadInsights(date) {
    const cacheKey = `arxiv-archive:insight:${date}`;
    const cached = lsGet(cacheKey);
    if (cached && Date.now() - cached.t < INSIGHT_TTL_MS) return cached.v;

    const res = await fetch(`${date}.html`, { cache: 'no-cache' });
    if (!res.ok) return [];
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const titles = Array.from(doc.querySelectorAll('.insight h3'))
      .map(el => el.textContent.replace(/^\s*\d+\.\s*/, '').trim())
      .filter(Boolean);
    lsSet(cacheKey, titles);
    return titles;
  }

  function renderRow(date) {
    const li = document.createElement('li');
    li.className = 'archive-item';
    const link = document.createElement('a');
    link.className = 'archive-link';
    link.href = `${date}.html`;

    const dateEl = document.createElement('span');
    dateEl.className = 'archive-date';
    dateEl.textContent = date;
    const dow = document.createElement('span');
    dow.className = 'archive-dow';
    dow.textContent = ` (${dowOf(date)})`;
    dateEl.appendChild(dow);

    const summary = document.createElement('span');
    summary.className = 'archive-summary placeholder';
    summary.textContent = '인사이트 불러오는 중…';

    link.appendChild(dateEl);
    link.appendChild(summary);
    li.appendChild(link);
    archive.appendChild(li);
    return summary;
  }

  function fillSummary(el, titles) {
    el.classList.remove('placeholder');
    el.textContent = '';
    if (!titles.length) {
      const em = document.createElement('em');
      em.className = 'empty';
      em.textContent = '(인사이트 없음)';
      el.appendChild(em);
      return;
    }
    titles.forEach((t, i) => {
      if (i > 0) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = '·';
        el.appendChild(dot);
      }
      el.appendChild(document.createTextNode(t));
    });
  }

  try {
    const dates = await listDates();
    if (!dates.length) {
      status.textContent = '아직 업로드된 브리핑이 없습니다.';
      return;
    }
    status.textContent = `총 ${dates.length}개의 브리핑 · 최신순 정렬`;

    const summaryEls = dates.map(renderRow);

    const CONCURRENCY = 6;
    let cursor = 0;
    await Promise.all(Array.from({ length: CONCURRENCY }, async () => {
      while (cursor < dates.length) {
        const i = cursor++;
        try {
          const titles = await loadInsights(dates[i]);
          fillSummary(summaryEls[i], titles);
        } catch {
          fillSummary(summaryEls[i], []);
        }
      }
    }));
  } catch (err) {
    status.textContent = '목록을 불러오지 못했습니다: ' + err.message;
  }
})();
</script>
</body>
</html>
